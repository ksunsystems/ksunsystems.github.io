<!DOCTYPE html>
<html>
<head>
<title>Kevin ❤️ Natasha Runner</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#ffd6e8, #fff);
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #e91e63;
}

canvas {
    background: #fff0f6;
    border: 3px solid #ff80ab;
    border-radius: 15px;
    margin-top: 20px;
}

p {
    color: #555;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>Kevin ❤️ Natasha Runner</h1>

<p>
Press SPACE or tap to jump ❤️
</p>

<canvas id="game" width="800" height="300"></canvas>

<h2 id="message"></h2>


<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x: 80,
    y: 220,
    width: 40,
    height: 40,
    velocity: 0,
    jumping: false
};

let gravity = 0.8;
let score = 0;
let gameSpeed = 5;

let hearts = [];
let obstacles = [];


// Draw player
function drawPlayer() {
    ctx.font = "40px Arial";
    ctx.fillText("🧍‍♂️", player.x, player.y + 35);
}


// Create hearts
function createHeart() {
    hearts.push({
        x: 800,
        y: Math.random() * 150 + 50,
        size: 30
    });
}


// Create obstacles
function createObstacle() {
    obstacles.push({
        x: 800,
        y: 230,
        size: 40
    });
}


// Jump
function jump() {
    if (!player.jumping) {
        player.velocity = -14;
        player.jumping = true;
    }
}


document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        jump();
    }
});


canvas.addEventListener("click", jump);


// Game loop
function update() {

    ctx.clearRect(0,0,canvas.width,canvas.height);


    // ground
    ctx.fillStyle = "#ffb6c1";
    ctx.fillRect(0,270,800,5);


    // Player physics
    player.velocity += gravity;
    player.y += player.velocity;


    if(player.y >= 220){
        player.y = 220;
        player.velocity = 0;
        player.jumping = false;
    }


    drawPlayer();


    // hearts
    hearts.forEach((heart,index)=>{

        heart.x -= gameSpeed;

        ctx.font = "30px Arial";
        ctx.fillText(
            "❤️",
            heart.x,
            heart.y
        );


        if(
            player.x < heart.x + 30 &&
            player.x + 40 > heart.x &&
            player.y < heart.y &&
            player.y + 40 > heart.y - 30
        ){
            hearts.splice(index,1);
            score += 10;
        }

    });


    // obstacles
    obstacles.forEach((obs,index)=>{

        obs.x -= gameSpeed;

        ctx.font = "35px Arial";
        ctx.fillText(
            "💔",
            obs.x,
            obs.y
        );


        if(
            player.x < obs.x + 30 &&
            player.x + 40 > obs.x &&
            player.y + 40 > obs.y - 30
        ){
            gameOver();
        }

    });


    // score
    ctx.font = "25px Arial";
    ctx.fillStyle = "#e91e63";

    ctx.fillText(
        "Love Points: " + score,
        20,
        40
    );


    if(Math.random() < 0.02){
        createHeart();
    }


    if(Math.random() < 0.015){
        createObstacle();
    }


    if(score >= 500){
        win();
        return;
    }


    requestAnimationFrame(update);
}



function gameOver(){

    cancelAnimationFrame();

    document.getElementById("message").innerHTML =
    "The journey continues ❤️ Try again!";

    score = 0;
    hearts=[];
    obstacles=[];

}


function win(){

    document.getElementById("message").innerHTML =
    "🏆 Natasha unlocked forever love ❤️ Kevin loves you very much ❤️";

}



update();

</script>

</body>
</html>
