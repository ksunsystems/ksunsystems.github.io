<!DOCTYPE html>
<html>
<head>
    <title>Kevin ❤️ Natasha</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd6e8, #ffeef7);
            font-family: "Arial", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        h1 {
            font-size: 55px;
            color: #e91e63;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 32px;
            color: #ff4081;
        }

        p {
            font-size: 22px;
            color: #555;
            line-height: 1.6;
        }

        .heart {
            font-size: 60px;
            animation: heartbeat 1.2s infinite;
        }

        .floating-heart {
            position: absolute;
            color: #ff4081;
            font-size: 30px;
            animation: float 6s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>

    <h1>Kevin loves Natasha</h1>

    <h2>very much ❤️</h2>

    <p>
        Every day with you is special.<br>
        Thank you for bringing happiness, laughter,
        and love into my life.
    </p>

    <p>
        Forever yours,<br>
        <strong>Kevin</strong> ❤️
    </p>

</div>

<!-- Floating hearts -->
<div class="floating-heart" style="left:10%; animation-delay:0s;">❤️</div>
<div class="floating-heart" style="left:25%; animation-delay:2s;">💕</div>
<div class="floating-heart" style="left:50%; animation-delay:4s;">❤️</div>
<div class="floating-heart" style="left:75%; animation-delay:1s;">💗</div>
<div class="floating-heart" style="left:90%; animation-delay:3s;">❤️</div>

</body>
</html>
